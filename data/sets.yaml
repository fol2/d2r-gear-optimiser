# D2R Set Items Reference Data
# Set items with individual stats, partial set bonuses, and full set bonuses.
# Focused on sets relevant to MF and endgame Warlock/caster builds.
#
# Sources: diablo.fandom.com, Arreat Summit, community-verified data.
#
# Schema notes:
#   - partial_bonuses: bonuses that apply when N items from the set are worn.
#     These are CUMULATIVE — the 3-item bonus includes the 2-item bonus.
#   - item_partial_bonus: bonuses that appear on individual items when
#     additional set pieces are worn (listed per item).
#   - full_bonus: additional bonuses when all items are worn (on top of partials).
#   - Variable stats shown with _min/_max suffix.
#
# Stat key reference (matches runes.yaml and runewords.yaml):
#   all_skills, class_skills, fcr, fhr, frw, fbr, ias, ed, mf, gold_find,
#   life, mana, strength, dexterity, vitality, energy,
#   resist_fire, resist_cold, resist_lightning, resist_poison, resist_all,
#   ll (life leech), ml (mana leech), dr (damage reduction %),
#   mdr (magic damage reduction)

sets:

  # ============================================================
  # TAL RASHA'S WRAPPINGS
  # ============================================================
  # Most relevant MF set. Designed for Sorceress but most pieces equippable by any class.
  # Only Tal Rasha's Lidless Eye (orb) requires Sorceress.

  - set_name: "Tal Rasha's Wrappings"
    class_affinity: sorceress
    items:

      - name: "Tal Rasha's Adjudication"
        base: "Amulet"
        slot: amulet
        level_req: 67
        affixes:
          sorceress_skills: 2
          resist_lightning: 33
          lightning_damage_min: 3
          lightning_damage_max: 32
          mana: 42
          life: 50
        item_partial_bonus:
          4:
            fcr: 10

      - name: "Tal Rasha's Lidless Eye"
        base: "Swirling Crystal"
        slot: weapon
        level_req: 65
        class_restricted: sorceress
        affixes:
          fcr: 20
          mana: 77
          life: 57
          energy: 10
          lightning_mastery_min: 1
          lightning_mastery_max: 2
          fire_mastery_min: 1
          fire_mastery_max: 2
          cold_mastery_min: 1
          cold_mastery_max: 2
        item_partial_bonus:
          2:
            sorceress_skills: 1
          3:
            enemy_fire_resist: -15
          4:
            enemy_lightning_resist: -15
          full:
            cold_skill_damage: 15

      - name: "Tal Rasha's Horadric Crest"
        base: "Death Mask"
        slot: helmet
        level_req: 66
        required_str: 55
        affixes:
          ll: 10
          ml: 10
          resist_all: 15
          defense: 45
          mana: 30
          life: 60

      - name: "Tal Rasha's Guardianship"
        base: "Lacquered Plate"
        slot: body
        level_req: 71
        required_str: 84
        affixes:
          defense: 400
          requirements: -60
          mdr: 15
          resist_cold: 40
          resist_lightning: 40
          resist_fire: 40
          mf: 88
        item_partial_bonus:
          2:
            fcr: 10

      - name: "Tal Rasha's Fine-Spun Cloth"
        base: "Mesh Belt"
        slot: belt
        level_req: 53
        required_str: 47
        affixes:
          requirements: -20
          damage_to_mana: 37
          mana: 30
          dexterity: 20
          mf_min: 10
          mf_max: 15
        item_partial_bonus:
          2:
            defense: 60
          3:
            fcr: 10

    partial_bonuses:
      2:
        replenish_life: 10
      3:
        mf: 65
      4:
        fhr: 25

    full_bonus:
      sorceress_skills: 3
      replenish_life: 10
      mf: 65
      fhr: 25
      life: 150
      resist_all: 50
      defense_vs_missile: 50
      defense: 150
    notes: |
      Full set MF total: 88 (armour) + 15 (belt) + 65 (partial) = 168 base MF.
      Most valuable partial: 3 items for +65% MF.
      Common partial combos: Armour + Belt + Amulet (3-piece for MF).

