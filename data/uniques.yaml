# D2R Unique Items Reference Data
# Stats reflect perfect / maximum rolls used by the optimiser for reference loadout
# validation. Variable stats use the max roll unless noted with _min/_max suffix.
#
# Sources: diablo.fandom.com, Arreat Summit, community-verified data.
#
# Stat key reference (matches runes.yaml and runewords.yaml):
#   all_skills, class_skills (e.g. sorceress_skills, fire_skills),
#   fcr, fhr, frw, fbr, ias, ed, mf, gold_find,
#   life, mana, strength, dexterity, vitality, energy,
#   resist_fire, resist_cold, resist_lightning, resist_poison, resist_all,
#   max_resist_fire, max_resist_cold, max_resist_lightning, max_resist_poison,
#   cb (crushing blow), ds (deadly strike), ow (open wounds),
#   ll (life leech), ml (mana leech), dr (damage reduction %),
#   mdr (magic damage reduction), damage_reduced (flat),
#   absorb_fire, absorb_cold, absorb_lightning

