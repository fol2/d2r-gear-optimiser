# D2R Runewords Reference Data
# Comprehensive list of ALL runewords in Diablo II: Resurrected (including Ladder-only
# and Reign of the Warlock / Season 13 additions).
#
# Sources: diablo-archive.fandom.com, diablo2.io, purediablo.com
#
# Schema notes:
#   - rune_sequence: runes in exact insertion order
#   - base_types: valid socketed item categories
#   - stats: use consistent keys (see below)
#   - Variable stats shown as midpoint or noted with _min/_max suffix
#
# Stat key reference:
#   all_skills, class_skills (e.g. fire_skills, sorceress_skills),
#   fcr, fhr, frw, fbr, ias, ed, mf, gold_find,
#   life, mana, strength, dexterity, vitality, energy,
#   resist_fire, resist_cold, resist_lightning, resist_poison, resist_all,
#   max_resist_fire, max_resist_cold, max_resist_lightning, max_resist_poison,
#   cb (crushing blow), ds (deadly strike), ow (open wounds),
#   ll (life leech), ml (mana leech), dr (damage reduction %),
#   mdr (magic damage reduction), damage_reduced (flat),
#   ctc_* (chance to cast), aura_* (grants aura),
#   absorb_fire, absorb_cold, absorb_lightning, absorb_magic

