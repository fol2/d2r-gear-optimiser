# D2R Base Item Types
# Base items that can receive runewords, be found as uniques/sets, or are commonly used
# in endgame builds. Focused on items relevant to Warlock and caster builds.
#
# Sources: Arreat Summit, diablo.fandom.com, community-verified data.
#
# Schema notes:
#   - base_defense: [min, max] range for armour/shields
#   - base_damage: [min, max] range for weapons (one-hand or two-hand as noted)
#   - base_block: block chance before class modifier (Amazon/Assassin/Barbarian base)
#   - speed: weapon speed modifier (negative = faster)
#   - item_category: maps to runewords.yaml base_types
#
# Category mapping to runewords.yaml abstract base_types:
#   "weapon"       → any weapon category (sword, axe, mace, hammer, etc.)
#   "melee_weapon" → any melee weapon (sword, axe, mace, hammer, scepter, etc.)
#   "club"         → subset of mace category (clubs are mace-class in D2R)

