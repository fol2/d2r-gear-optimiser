# D2R Breakpoint Tables
#
# Breakpoints define the FCR/FHR/FBR thresholds at which animation frames decrease.
# Each entry: threshold = minimum stat % required, frames = resulting animation frames.
# Values must meet or exceed the threshold to achieve that breakpoint.
#
# Sources:
#   Classic classes: PureDiablo, The Amazon Basin, community-verified since 2001.
#   Warlock: implementation plan P2.2 confirms FCR thresholds (0,9,20,37,63,105,200);
#            FHR derived from community testing (Reign of the Warlock expansion, 2026).

breakpoints:

  # ─── WARLOCK ────────────────────────────────────────────────────────────────
  # New class added in D2R "Reign of the Warlock" expansion.
  # FCR thresholds confirmed identical to Sorceress (non-Lightning) / Barbarian table.
  # FHR thresholds from community testing; shares the Necromancer/Paladin FHR table.
  warlock:
    fcr:
      - { threshold: 0, frames: 15 }
      - { threshold: 9, frames: 14 }
      - { threshold: 20, frames: 13 }
      - { threshold: 37, frames: 12 }
      - { threshold: 63, frames: 11 }
      - { threshold: 105, frames: 10 }
      - { threshold: 200, frames: 9 }
    fhr:
      - { threshold: 0, frames: 13 }
      - { threshold: 5, frames: 12 }
      - { threshold: 9, frames: 11 }
      - { threshold: 14, frames: 10 }
      - { threshold: 20, frames: 9 }
      - { threshold: 30, frames: 8 }
      - { threshold: 42, frames: 7 }
      - { threshold: 60, frames: 6 }
      - { threshold: 86, frames: 5 }
      - { threshold: 142, frames: 4 }
      - { threshold: 280, frames: 3 }

